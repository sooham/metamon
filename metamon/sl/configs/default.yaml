# WorldModel State-Learning Transformer — model hyperparameters.
#
# Training hyperparameters (lr, epochs, batch_size, etc.) are passed
# via CLI flags to train.py and are NOT stored here.

model:
  # vocabulary size (auto-detected from tokenizer or data if not set)
  vocab_size: null

  # Safety factor for context window: C = (MAX_STATE_LENGTH + ACTION_OVERHEAD) * safety_factor
  # MAX_STATE_LENGTH = 260 (max WorldModelObservationSpace tokens)
  # ACTION_OVERHEAD  = 5   (<eos> <boa> A <eoa> <bos> between state_t and state_next)
  # Default 2.0 → C = ceil(265 * 2.0 / 64) * 64 = 576
  safety_factor: 2.0

  # Maximum sequence length the RoPE cache supports.
  # Must be >= max prefix + max_new_tokens (≈ 527 + 340 = 867 for generation).
  # 1024 gives generous headroom.
  max_seq_len: 1024

  # residual stream / embedding dimension
  d_model: 256

  # number of attention heads
  n_heads: 8

  # number of transformer layers
  n_layers: 6

  # feed-forward hidden dimension (applied to both gate & up in SwiGLU,
  # or single projection in GELU)
  d_ff: 1024

  # FFN activation type: "swiglu" or "gelu"
  # swiglu: gate = SiLU(W1(x)), up = W2(x), out = W_out(gate * up)  (3× activation memory)
  # gelu:   out = W_out(GELU(W(x)))                                   (1× activation memory)
  ffn_activation: gelu

  # dropout rate
  dropout: 0.1

  # RoPE base frequency
  theta: 10000.0
